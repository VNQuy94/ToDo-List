services:
  # ==========================================
  # 1. MongoDB Database Service
  # ==========================================
  mongodb:
    image: mongo:${MONGO_VERSION}
    container_name: ${MONGO_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - todo_network
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_ROOT_USER}", "--password", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ==========================================
  # 2. Express API Server (Backend)
  # ==========================================
  backend:
    build:
      context: ./backend
      target: development
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:5000"
    env_file:
      - ./backend/.env
    environment:
      # Connect via internal container hostname instead of localhost
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/todo_db?authSource=admin
    volumes:
      # Mount source code for live-reload
      - ./backend:/app
      # Prevent host node_modules from overwriting container dependencies
      - /app/node_modules
    networks:
      - todo_network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + (process.env.PORT || 5000) + '/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ==========================================
  # 3. React Vite App (Frontend)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5173"
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://backend:5000
    volumes:
      # Mount source code for HMR
      - ./frontend:/app
      # Prevent host node_modules from overwriting container dependencies
      - /app/node_modules
    networks:
      - todo_network
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # 4. Database Seeder (One-shot Tool)
  # ==========================================
  db-seeder:
    image: node:20-alpine
    container_name: todo-db-seeder
    profiles:
      - tools
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./backend/src/models:/app/backend/src/models
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/todo_db?authSource=admin
    networks:
      - todo_network
    depends_on:
      mongodb:
        condition: service_healthy
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install --prod && node scripts/seed.js"

# ==========================================================
# Network and Volume Configurations
# ==========================================
networks:
  todo_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
